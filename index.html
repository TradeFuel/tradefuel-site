<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TRADEFUEL™</title>

  <style>
    body {
      margin: 0;

      height: 100vh;
      color: white;
    }

    .overlay {
      background: rgba(0,0,0,0.65);
      height: 100vh;
      display: flex;
      align-items: center;
      padding-left: 10%;

    .content {
      max-width: 500px;
    }

      font-size: 72px;

    }

    h2 {
      color: orange;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      line-height: 1.5;
    }

    .button {
      display: inline-block;
      margin-top: 25px;
      padding: 15px 30px;
      background: orange;
      color: black;
      text-decoration: none;
      font-weight: bold;
      border-radius: 5px;
    }

    .button:hover {
      opacity: 0.9;
    }

</head>

<body>

  <div class="overlay">
    <div class="content">
      <h1>TRADEFUEL™</h1>
